<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consejero Vocacional</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            padding: 24px 28px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(168, 85, 247, 0.3));
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-header .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .chat-header .info h1 { color: white; font-size: 18px; font-weight: 600; }
        .chat-header .info p { color: rgba(255, 255, 255, 0.6); font-size: 13px; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: messageIn 0.3s ease-out;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.bot { align-self: flex-start; }

        .message .bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            border-bottom-right-radius: 4px;
        }

        .message.bot .bubble {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom-left-radius: 4px;
        }

        .message .avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .message.user .avatar-small { background: linear-gradient(135deg, #6366f1, #7c3aed); color: white; }
        .message.bot .avatar-small { background: linear-gradient(135deg, #a855f7, #d946ef); color: white; }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            gap: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .typing-indicator.active { display: flex; animation: messageIn 0.3s ease-out; }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .chat-input {
            padding: 20px 28px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
        }

        .chat-input input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.06);
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input input::placeholder { color: rgba(255, 255, 255, 0.3); }
        .chat-input input:focus { border-color: rgba(99, 102, 241, 0.5); }

        .chat-input button {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }

        .chat-input button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .chat-input button:active { transform: translateY(0); }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        @media (max-width: 600px) {
            body { padding: 0; }
            .chat-container { height: 100vh; border-radius: 0; max-width: 100%; }
            .chat-messages { padding: 16px; }
            .chat-input { padding: 16px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">&#x1F9D1;&#x200D;&#x1F393;</div>
            <div class="info">
                <h1>Consejero Vocacional</h1>
                <p>Tu amigo Alex &#x2014; siempre listo para orientarte</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="avatar-small">&#x1F9D1;&#x200D;&#x1F393;</div>
                <div class="bubble">&#x1F3DB; &#xA1;Hola! Soy Alex, tu consejero vocacional. &#xBF;Qu&#xE9; carrera te interesa? Cu&#xE9;ntame de tus gustos y te ayudo a encontrar tu camino.</div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>

        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Escribe tu mensaje..." autofocus>
            <button id="sendButton">Enviar</button>
        </div>
    </div>

    <script>
        const conversationId = crypto.randomUUID();

        const chatMessages = document.getElementById('chatMessages');
        const typingIndicator = document.getElementById('typingIndicator');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        let isStreaming = false;

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = 'message ' + role;

            const avatar = document.createElement('div');
            avatar.className = 'avatar-small';
            avatar.innerHTML = role === 'bot' ? '&#x1F9D1;&#x200D;&#x1F393;' : '&#x1F464;';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            div.appendChild(avatar);
            div.appendChild(bubble);
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function updateLastBotMessage(chunk) {
            let lastMessage = chatMessages.querySelector('.message.bot:last-child');
            if (!lastMessage) {
                const div = document.createElement('div');
                div.className = 'message bot';

                const avatar = document.createElement('div');
                avatar.className = 'avatar-small';
                avatar.innerHTML = '&#x1F9D1;&#x200D;&#x1F393;';

                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = '';

                div.appendChild(avatar);
                div.appendChild(bubble);
                chatMessages.appendChild(div);
                lastMessage = div;
            }
            const bubble = lastMessage.querySelector('.bubble');
            bubble.textContent += chunk;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const mensaje = messageInput.value.trim();
            if (!mensaje || isStreaming) return;

            messageInput.value = '';
            addMessage(mensaje, 'user');
            isStreaming = true;
            sendButton.disabled = true;
            typingIndicator.classList.add('active');

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje, conversationId })
                });

                if (!response.ok) throw new Error('Error del servidor');

                typingIndicator.classList.remove('active');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const chunk = line.slice(5).trim();
                            if (chunk) updateLastBotMessage(chunk);
                        }
                    }
                }

                if (buffer.startsWith('data:')) {
                    const chunk = buffer.slice(5).trim();
                    if (chunk) updateLastBotMessage(chunk);
                }

            } catch (error) {
                typingIndicator.classList.remove('active');
                const errorMsg = 'Lo siento, hubo un error de comunicaci\u00F3n. \u00BFIntentamos de nuevo?';
                let lastMessage = chatMessages.querySelector('.message.bot:last-child');
                if (lastMessage && lastMessage.querySelector('.bubble').textContent === '') {
                    lastMessage.querySelector('.bubble').textContent = errorMsg;
                } else {
                    addMessage(errorMsg, 'bot');
                }
            } finally {
                isStreaming = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
